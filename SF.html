<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For You, อ้วน 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Arial", sans-serif;
}

body {
    background: linear-gradient(135deg, #ffe4ec, #fff5f8);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
}

.container {
    background: rgba(255,255,255,0.92);
    border-radius: 35px;
    padding: 30px;
    max-width: 900px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(255, 105, 180, 0.2);
    text-align: center;
    position: relative;
    animation: fadeIn 1.5s ease;
}

.top-bar {
    font-size: 1.2rem;
    color: #ff6b9a;
    margin-bottom: 20px;
    font-weight: bold;
}

h1 {
    font-size: 4rem;
    color: #5b2c2c;
    line-height: 1.2;
    margin-bottom: 20px;
}

h1 span {
    color: #ff6b9a;
}

.photo {
    width: 100%;
    max-width: 450px;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    object-fit: cover;
    border: 8px solid #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    margin: 20px auto;
    display: block;
}

.message-box {
    margin-top: 30px;
    background: #fff9fb;
    border: 3px dashed #ffd1dc;
    border-radius: 25px;
    padding: 35px 25px;
}

.message-box p {
    font-size: 1.5rem;
    line-height: 2;
    color: #5a3d3d;
}

.highlight {
    color: #ff6b9a;
    font-weight: bold;
    font-size: 1.8rem;
}

.footer {
    margin-top: 25px;
    font-size: 1.4rem;
    color: #ff8fab;
    font-weight: bold;
}

.heart {
    position: fixed;
    font-size: 24px;
    color: rgba(255, 105, 180, 0.5);
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: -1;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes floatUp {
    from {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    to {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}

@media (max-width: 768px) {
    h1 {
        font-size: 2.4rem;
    }

    .message-box p {
        font-size: 1.2rem;
    }

    .highlight {
        font-size: 1.4rem;
    }

    .footer {
        font-size: 1.1rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="top-bar">💖 For You, อ้วน 💖</div>

    <h1>
        Safe Flight,<br>
        <span>My Love ♡</span>
    </h1>

    <img src="https://i.ibb.co/zT3GXG5b/AOM1.jpg" alt="My Love" class="photo">

    <div class="message-box">
        <p>
            Have a safe journey Naa, อ้วน. 💖<br>
            Take care of yourself and text me when you arrive.<br>
            I'll be waiting for you na. ♡
        </p>

        <br>

        <p class="highlight">
            ขอให้เป็นการฝึกงานที่ดีน้าค้าบ ✨
        </p>

        <p>
            สู้ ๆ นะอ้วน เป็นกำลังใจให้เสมอน้ะค้าบบบ! รักอ้วนน้ะคะ💕
        </p>
    </div>

    <div class="footer">
        With all my love 💗
    </div>
</div>

<script>
for (let i = 0; i < 25; i++) {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = ["💖", "💕", "💗", "💘"][Math.floor(Math.random() * 4)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 6) + "s";
    heart.style.animationDelay = Math.random() * 5 + "s";
    heart.style.fontSize = (20 + Math.random() * 25) + "px";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
